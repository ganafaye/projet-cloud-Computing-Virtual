apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-web
  namespace: ganafaye-dev
spec:
  runStrategy: Manual
  template:
    spec:
      domain:
        cpu:
          cores: 1
        memory:
          guest: 2Gi
        devices:
          disks:
            - name: containerdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              bridge: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/containerdisks/ubuntu:22.04
        - name: cloudinitdisk
          cloudInitConfigDrive:
            userData: |
              #cloud-config
              user: ubuntu
              password: ubuntu
              chpasswd:
                expire: false
              ssh_pwauth: true
              packages:
                - nginx
                - nodejs
                - npm
                - mysql-client
              runcmd:
                - ip addr add 192.168.100.10/24 dev lo:1
                - ip link set lo:1 up
                - systemctl start nginx
                - mkdir -p /opt/app
                - cd /opt/app && npm init -y && npm install express
                - echo "const express = require('express'); const app = express(); app.get('/', (req, res) => res.send('<h1>VM-WEB DMZ</h1><p>IP: 192.168.100.10</p>')); app.listen(3000, '0.0.0.0');" > /opt/app/server.js
                - node /opt/app/server.js &
