apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-gw
  namespace: ganafaye-dev
spec:
  runStrategy: Always
  template:
    spec:
      domain:
        cpu:
          cores: 1
        memory:
          guest: 2Gi
        devices:
          disks:
            - name: containerdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              bridge: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/containerdisks/ubuntu:22.04
        - name: cloudinitdisk
          cloudInitConfigDrive:
            userData: |
              #cloud-config
              user: ubuntu
              password: ubuntu
              chpasswd:
                expire: false
              ssh_pwauth: true
              packages:
                - iptables
                - iptables-persistent
              runcmd:
                - ip addr add 192.168.100.1/24 dev lo:1
                - ip addr add 192.168.10.1/24 dev lo:2
                - ip link set lo:1 up
                - ip link set lo:2 up
                - echo 'net.ipv4.ip_forward=1' >> /etc/sysctl.conf
                - sysctl -p
                - iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
                - iptables -A INPUT -p tcp --dport 22 -j ACCEPT
                - iptables -A FORWARD -s 192.168.100.0/24 -d 192.168.10.0/24 -p tcp --dport 3306 -j ACCEPT
                - iptables -A FORWARD -i eth0 -d 192.168.100.0/24 -p tcp --dport 80 -j ACCEPT
                - iptables -A FORWARD -i eth0 -d 192.168.100.0/24 -p tcp --dport 443 -j ACCEPT
                - iptables-save > /etc/iptables/rules.v4
