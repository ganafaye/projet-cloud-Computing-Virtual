apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: ganafaye-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "rootpassword"
            - name: MYSQL_DATABASE
              value: "webapp"
            - name: MYSQL_USER
              value: "webapp"
            - name: MYSQL_PASSWORD
              value: "password"
          ports:
            - containerPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: ganafaye-dev
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
