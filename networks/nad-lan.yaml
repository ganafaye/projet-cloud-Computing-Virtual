apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: lan-network
  namespace: ganafaye-dev
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "bridge",
      "bridge": "br-lan",
      "ipam": {
        "type": "static",
        "addresses": [
          {
            "address": "192.168.10.0/24",
            "gateway": "192.168.10.1"
          }
        ]
      }
    }
